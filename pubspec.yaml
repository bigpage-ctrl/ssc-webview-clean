name: ssc_app
description: A WebView application for SSC Group of Institutions.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.7.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  assets:
    - assets/
  uses-material-design: true

flutter_launcher_icons:
  android: true       # Changed to true to safely overwrite the default icon
  ios: false
  image_path: "assets/new-logo.png"
