workflows:
  android-build:
    name: Android Build (APK & AAB)
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Clear and Recreate Android cleanly
        script: |
          rm -rf android
          flutter create --platforms=android .
      - name: Inject Internet Permission
        script: |
          python3 -c "
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f: text = f.read()
          text = text.replace('<application', '<uses-permission android:name=\"android.permission.INTERNET\"/>\n    <application')
          with open(path, 'w') as f: f.write(text)
          "
      - name: Install dependencies
        script: flutter pub get
      - name: Verify and Generate App Icons
        script: |
          if [ ! -f "assets/new-logo.png" ]; then
            echo "--------------------------------------------------------"
            echo "ERROR: 'assets/new-logo.png' was not found!"
            echo "Please check your GitHub repository folder and file name."
            echo "--------------------------------------------------------"
            exit 1
          fi
          dart run flutter_launcher_icons
      - name: Build APK and AAB (Icon Fix)
        script: |
          flutter build apk --release --no-tree-shake-icons
          flutter build appbundle --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
